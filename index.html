<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Géraldine &amp; Mattéo — Save the Date</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Manrope:wght@400;500;600&family=Dancing+Script:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SECTION 1: Hero -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="title-save">SAVE</span>
        <span class="title-the">the</span>
        <span class="title-date">DATE</span>
      </h1>
      <h2 class="hero-names">Géraldine et Mattéo</h2>
      <p class="hero-word">On se marie !</p>
    </div>
    <a href="#reveal" class="scroll-hint" aria-label="Faites défiler vers le bas">
      <span class="chevron"></span>
    </a>
  </section>

  <!-- SECTION 2: Illustrations, contenu central, illustrations -->
  <section class="reveal" id="reveal">
    <div class="reveal-sidebar reveal-sidebar-left">
      <img src="assets/illustrations/vespa.svg" alt="Décoration gauche" class="illustration-float" />
    </div>

    <div class="reveal-inner">
      <p class="phrase fade-up">Nous nous marions, et nous serions ravis de vous compter parmi nous.</p>

      <div class="scratch-card" id="scratch-card">
        <p class="reveal-date">21 . 08 . 2027</p>
        <canvas id="scratch-canvas" class="scratch-canvas" aria-hidden="true"></canvas>
      </div>
      <p class="scratch-hint fade-up">Grattez pour révéler la date</p>

      <p class="save-the-date-label fade-up">Réservez la date — plus de détails à venir</p>

      <div class="calendar-actions fade-up">
        <button id="add-calendar" class="btn btn-primary" type="button">Ajouter au calendrier</button>
      </div>
    </div>

    <div class="reveal-sidebar reveal-sidebar-right">
      <!-- Illustration droite (à ajouter) -->
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
